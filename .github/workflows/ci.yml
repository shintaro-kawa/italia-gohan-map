name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check + build
        run: pnpm build

      - name: Validate restaurants.json structure
        run: |
          node -e "
            const data = JSON.parse(require('fs').readFileSync('data/restaurants.json', 'utf-8'));
            if (!Array.isArray(data)) throw new Error('Not an array');
            for (const r of data) {
              if (!r.name || !r.city || !r.genre) throw new Error('Missing required field in ' + (r.id ?? r.name));
              if (typeof r.lat !== 'number' || typeof r.lng !== 'number') throw new Error('Invalid coords in ' + r.id);
            }
            console.log('OK:', data.length, 'restaurants');
          "
